<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>HVAC Naval Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="modalProyecto" class="overlay">
    <div class="modal">
        <h2>🚢 Proyecto HVAC Naval</h2>
        <input type="text" id="p_buque" placeholder="Nombre del Buque">
        <input type="text" id="p_astillero" placeholder="Astillero">
        <button class="btn-main" onclick="proyectManager.crearNuevo()">Empezar</button>
    </div>
</div>

<header class="header-nav">
    <div class="proj-badge"><span id="badge-buque">PROYECTO</span></div>
    <div class="line-badge" id="active-line-name">Seleccione Línea</div>
</header>

<main>
    <section id="page-lineas" class="page active">
        <div class="section-header"><h3>Líneas 5101</h3><button onclick="lineManager.nuevaLinea()">+</button></div>
        <div id="listaLineas" class="scroll-list"></div>
    </section>

    <section id="page-red" class="page">
        <div class="toolbar-red">
            <button onclick="netManager.addNode('principal')">Pral</button>
            <button onclick="netManager.addNode('ramal')">Ramal</button>
        </div>
        <div id="treeContainer" class="tree-view"></div>
        <div id="editPanel" class="panel-editor" style="display:none;">
            <div class="grid-inputs">
                <div class="input-item">
                    <label>Forma</label>
                    <select id="nodeForma" onchange="netManager.updateNode()">
                        <option value="rectangular">Rectangular</option>
                        <option value="circular">Circular (Ø)</option>
                        <option value="oval">Ovalado</option>
                    </select>
                </div>
                <div class="input-item"><label>Bloque</label><input type="text" id="nodeBloque" oninput="netManager.updateNode()"></div>
                <div class="input-item"><label>Ancho/Ø (mm)</label><input type="number" id="nodeAncho" oninput="netManager.updateNode()"></div>
                <div class="input-item"><label>Alto (mm)</label><input type="number" id="nodeAlto" oninput="netManager.updateNode()"></div>
                <div class="input-item"><label>Long (m)</label><input type="number" id="nodeL" step="0.1" oninput="netManager.updateNode()"></div>
                <div class="input-item"><label>Caudal (m³/h)</label><input type="number" id="nodeCaudal" oninput="netManager.updateNode()"></div>
            </div>
        </div>
    </section>

    <section id="page-visor" class="page">
        <div id="container3d"></div>
    </section>

    <section id="page-calculo" class="page">
        <div class="card-result">
            <h3>Presión Ventilador</h3>
            <div class="main-stat"><span id="resPresion">0</span> Pa</div>
            <button class="btn-calc" onclick="netManager.analizarYOptimizar()">CALCULAR RUTA CRÍTICA</button>
            <button class="btn-sync" onclick="dbManager.guardarProyecto()">☁️ SINCRONIZAR NUBE</button>
        </div>
        <div class="card-bom" id="resBOM"></div>
    </section>
</main>

<nav class="tab-bar">
    <button onclick="ui.showPage('lineas', this)">📋</button>
    <button onclick="ui.showPage('red', this)">📐</button>
    <button onclick="ui.showPage('visor', this)">🧊</button>
    <button onclick="ui.showPage('calculo', this)">📊</button>
</nav>

<script src="app.js" type="module"></script>
</body>
</html>
