<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HVAC Marine Designer PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
</head>
<body>

<header class="main-header">
    <div class="project-info">
        <span>PROYECTO: <b id="val-buque">NIKE-2026</b></span> | 
        <span>HULL: <b id="val-hull">C-540</b></span> | 
        <span>BLOQUE: <b id="val-bloque">102</b></span>
    </div>
    <div class="header-actions">
        <input type="file" id="import-3d" style="display:none" onchange="visor3D.importarArchivo(event)">
        <button class="btn-import" onclick="document.getElementById('import-3d').click()">📥 Importar Estructura</button>
        <button class="btn-save" onclick="dbManager.guardar()">💾 Guardar</button>
    </div>
</header>

<div class="app-container">
    <aside class="sidebar-config">
        <h3>⚙️ Configuración</h3>
        
        <label>Jerarquía</label>
        <select id="compJerarquia">
            <option value="Principal">Conducto Principal</option>
            <option value="Ramal">Ramal</option>
            <option value="Derivación">Derivación</option>
        </select>

        <label>Tipo conducto</label>
        <select id="compForma" onchange="ui.toggleForma(this.value)">
            <option value="rectangular">Rectangular</option>
            <option value="circular">Circular</option>
        </select>

        <label>Accesorio (Cátalogo Naval)</label>
        <select id="compTipo"></select>

        <div id="dims-rect" class="input-row">
            <div><label>W (mm)</label><input type="number" id="compW" value="400"></div>
            <div><label>H (mm)</label><input type="number" id="compH" value="300"></div>
        </div>
        <div id="dims-circ" class="input-row" style="display:none">
            <div><label>Ø (mm)</label><input type="number" id="compD" value="250"></div>
        </div>

        <div class="input-row">
            <div><label>L (mm)</label><input type="number" id="compL" value="1000"></div>
            <div><label>Q (m³/h)</label><input type="number" id="compQ" value="1200"></div>
        </div>

        <label>Dirección Proyectada</label>
        <select id="compDir">
            <option value="X">PROA (+X)</option>
            <option value="-X">POPA (-X)</option>
            <option value="Y">BABOR (+Y)</option>
            <option value="-Y">ESTRIBOR (-Y)</option>
            <option value="Z">ARRIBA (+Z)</option>
            <option value="-Z">ABAJO (-Z)</option>
        </select>

        <button class="btn-add" onclick="netManager.addNode()">✅ AÑADIR A LA RED</button>
    </aside>

    <main class="visor-area">
        <div id="container3d"></div>
        
        <div class="selection-bar">
            <div id="selected-info" class="info-text">Seleccione un elemento del listado para editar sus parámetros...</div>
            
            <div id="grid-edicion" class="data-grid-pro">
                </div>

            <div class="edit-actions">
                <button class="btn-modify" onclick="netManager.modifyNode()">💾 Modificar Selección</button>
                <button class="btn-delete" onclick="netManager.deleteNode()">🗑️ Eliminar</button>
            </div>
        </div>
    </main>
</div>

<footer class="main-footer">
    <div class="footer-left">
        <button onclick="ui.alert('Datos diseño')">Datos diseño</button>
        <button onclick="ui.alert('Lineas')">Lineas</button>
        <button onclick="ui.alert('Visor 3D')">Visor 3D</button>
    </div>
    <div class="footer-right">
        <button onclick="ui.alert('Exportando...')">Exportación 3D</button>
        <button onclick="location.reload()">Cambiar proyecto</button>
        <button class="btn-exit" onclick="window.close()">Salir</button>
    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
