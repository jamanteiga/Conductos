<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HVAC Marine Designer - Desktop Professional</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<header class="main-header">
    <div class="project-info">
        <span id="header-buque">PROYECTO: ---</span> | 
        <span id="header-hull">HULL: ---</span> | 
        <span id="header-bloque">BLOQUE: ---</span>
    </div>
    <div class="header-actions">
        <button onclick="dbManager.guardar()">Guardar</button>
        <select id="langSelector"><option>Idioma</option></select>
    </div>
</header>

<div class="app-container">
    <aside class="sidebar-config">
        <h3>Configuración componente</h3>
        
        <div class="input-group">
            <label>Jerarquía</label>
            <select id="compJerarquia">
                <option value="Principal">Conducto Principal</option>
                <option value="Ramal">Ramal</option>
                <option value="Derivación">Derivación</option>
            </select>
        </div>

        <div class="input-group">
            <label>Tipo conducto</label>
            <select id="compForma" onchange="ui.toggleForma(this.value)">
                <option value="rectangular">Rectangular</option>
                <option value="circular">Circular</option>
                <option value="oval">Oval</option>
            </select>
        </div>

        <div class="input-group">
            <label>Accesorio</label>
            <select id="compTipo"></select> </div>

        <div id="dims-rect" class="input-row">
            <div><label>W (mm)</label><input type="number" id="compW" value="400"></div>
            <div><label>H (mm)</label><input type="number" id="compH" value="300"></div>
        </div>

        <div id="dims-circ" class="input-row" style="display:none">
            <div><label>Ø (mm)</label><input type="number" id="compD" value="250"></div>
        </div>

        <div class="input-row">
            <div><label>L (m)</label><input type="number" id="compL" step="0.1" value="1.0"></div>
            <div><label>Caudal (m³/h)</label><input type="number" id="compQ" value="1200"></div>
        </div>

        <div class="input-group">
            <label>Dirección proyectada</label>
            <select id="compDir">
                <option value="X">PROA (+X)</option>
                <option value="-X">POPA (-X)</option>
                <option value="Y">BABOR (+Y)</option>
                <option value="-Y">ESTRIBOR (-Y)</option>
                <option value="Z">ARRIBA (+Z)</option>
                <option value="-Z">ABAJO (-Z)</option>
            </select>
        </div>

        <button class="btn-add" onclick="netManager.addNode()">Añadir a la red</button>
    </aside>

    <main class="visor-area">
        <div id="container3d">
            <div class="placeholder-text">Visor 3D</div>
        </div>
        
        <div class="selection-bar">
            <div id="selected-data">datos de linea/ramal derivación o accesorio</div>
            <button class="btn-modify">Modificar</button>
        </div>
    </main>
</div>

<footer class="main-footer">
    <div class="footer-left">
        <button onclick="ui.showSection('diseno')">Datos diseño</button>
        <button onclick="ui.showSection('lineas')">Lineas</button>
        <button onclick="ui.showSection('visor')">Visor 3D</button>
    </div>
    <div class="footer-right">
        <button>Exportación 3D</button>
        <button onclick="proyectManager.cambiar()">Cambiar proyecto</button>
        <button class="btn-exit">Salir</button>
    </div>
</footer>

<script src="app.js" type="module"></script>
</body>
</html>
