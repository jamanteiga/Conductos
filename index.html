<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>Conductos HVAC Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .tree-node { margin-left: 20px; border-left: 2px dashed #ccc; padding-left: 10px; }
        .type-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-right: 5px; color: white; }
        .tag-principal { background: #007aff; }
        .tag-ramal { background: #5856d6; }
        .tag-derivacion { background: #ff9500; }
        .btn-hier { flex:1; padding: 10px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; color: white; }
        .active-node { border: 2px solid #007aff !important; background: #f0f7ff; }
    </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-logo">🌬️ <span>HVAC Network</span></div>
  <div class="hdr-r" id="hdrR">— Pa/m</div>
</header>

<div class="page active" data-page="red">
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-bottom:12px">
    <button onclick="addJerarquia('principal')" class="btn-hier" style="background:#007aff">＋ Principal</button>
    <button onclick="addJerarquia('ramal')" id="btnNewR" class="btn-hier" style="background:#5856d6">＋ Ramal</button>
    <button onclick="addJerarquia('derivacion')" id="btnNewD" class="btn-hier" style="background:#ff9500">＋ Derivación</button>
    <button onclick="clearRed()" style="background:#fff; color:#ff3b30; border:1px solid #ff3b30; border-radius:8px">✕ Limpiar</button>
  </div>

  <div id="redTreeView"></div>

  <div class="sec">Accesorios (K/ζ)</div>
  <div class="card">
    <input type="text" id="searchFitting" placeholder="🔍 Buscar accesorio..." oninput="filterFittings(this.value)" style="margin-bottom:10px">
    <div id="fittingsList" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; max-height:200px; overflow-y:auto;">
        </div>
  </div>

  <div class="sec">Resumen Crítico</div>
  <div class="card">
    <div class="rg">
      <div class="rc"><div class="rl">ΔP Total Sistema</div><div class="rv" id="redDP" style="color:var(--rd)">0</div><div class="ru">Pa</div></div>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nb" data-nav="calculo"><span>🔧</span></button>
  <button class="nb active" data-nav="red"><span>🗺</span></button>
  <button class="nb" data-nav="config"><span>⚙️</span></button>
</nav>

<script type="module" src="js/app.js"></script>
</body>
</html>
