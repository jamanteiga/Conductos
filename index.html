<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HVAC Naval Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="modalPin" class="overlay">
    <div class="modal">
        <h2>🔒 Acceso Seguro</h2>
        <input type="password" id="inputPin" placeholder="PIN" maxlength="4" style="text-align: center; font-size: 28px; letter-spacing: 10px;">
        <button class="btn-main" onclick="authManager.login()">ENTRAR</button>
    </div>
</div>

<div id="modalProyecto" class="overlay" style="display:none;">
    <div class="modal">
        <h2>🚢 Proyectos</h2>
        <div id="listaProyectosNube" class="scroll-mini">Buscando en la nube...</div>
        <hr>
        <div class="nuevo-proy-box">
            <input type="text" id="p_buque" placeholder="Nombre del Buque (ej. NB-701)">
            <button class="btn-main" onclick="proyectManager.crearNuevo()">CREAR NUEVO PROYECTO</button>
        </div>
    </div>
</div>

<header class="header-nav">
    <div class="proj-badge"><span id="badge-buque">Sin Proyecto</span></div>
    <div id="status-sync" class="status-dot"></div>
</header>

<main>
    <section id="page-lineas" class="page active">
        <div class="section-header">
            <h3>Líneas de Ventilación</h3>
            <button class="btn-add" onclick="lineManager.nuevaLinea()">+</button>
        </div>
        <div id="listaLineas" class="scroll-list"></div>
    </section>

    <section id="page-red" class="page">
        <div class="toolbar-red">
            <button onclick="netManager.addNode('recto')">+ Recto</button>
            <button onclick="netManager.addNode('codo_90')">+ Codo</button>
            <button onclick="netManager.addNode('te')">+ Te</button>
            <button onclick="netManager.deleteNode()" class="btn-del">🗑️</button>
        </div>
        <div id="treeContainer" class="tree-view"></div>
        <div id="editPanel" class="panel-editor" style="display:none;">
            <div class="grid-inputs">
                <select id="nodeTipoPieza" onchange="netManager.updateNode()">
                    <option value="recto">Tramo Recto</option>
                    <option value="codo_90">Codo 90°</option>
                    <option value="codo_45">Codo 45°</option>
                    <option value="te">Te / Derivación</option>
                </select>
                <select id="nodeDir" onchange="netManager.updateNode()">
                    <option value="X">PROA (+X)</option><option value="-X">POPA (-X)</option>
                    <option value="Y">BABOR (+Y)</option><option value="-Y">ESTRIBOR (-Y)</option>
                    <option value="Z">ARRIBA (+Z)</option><option value="-Z">ABAJO (-Z)</option>
                </select>
                <input type="number" id="nodeAncho" placeholder="Ancho (mm)" oninput="netManager.updateNode()">
                <input type="number" id="nodeAlto" placeholder="Alto (mm)" oninput="netManager.updateNode()">
                <input type="number" id="nodeL" step="0.1" placeholder="Long (m)" oninput="netManager.updateNode()">
                <input type="number" id="nodeCaudal" placeholder="Q (m³/h)" oninput="netManager.updateNode()">
                <select id="nodeForma" onchange="netManager.updateNode()">
                    <option value="rectangular">Rectangular</option>
                    <option value="circular">Circular</option>
                </select>
            </div>
            <div class="info-live">Vel: <b id="liveVel">0</b> m/s | Peso: <b id="liveWeight">0</b> kg</div>
        </div>
    </section>

    <section id="page-visor" class="page">
        <div id="container3d"></div>
    </section>

    <section id="page-calculo" class="page">
        <div class="card-result">
            <h3>Presión Total Estática</h3>
            <div class="main-stat"><span id="resPresion">0</span> Pa</div>
            <div class="export-grid">
                <button class="btn-exp" onclick="exportManager.toExcel()">EXCEL</button>
                <button class="btn-exp btn-cad" onclick="exportManager.toCAD()">CAD (DXF)</button>
            </div>
            <button class="btn-calc" onclick="netManager.analizarYOptimizar()">CALCULAR SISTEMA</button>
        </div>
    </section>
</main>

<nav class="tab-bar">
    <button onclick="ui.showPage('lineas')">📋</button>
    <button onclick="ui.showPage('red')">📐</button>
    <button onclick="ui.showPage('visor')">🧊</button>
    <button onclick="ui.showPage('calculo')">📊</button>
</nav>

<script src="app.js" type="module"></script>
</body>
</html>
