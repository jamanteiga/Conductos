<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC Naval Designer PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="win11-light">

<header class="win-appbar">
    <div class="app-title"><b>HVAC Designer</b> | <span id="badge-buque">---</span></div>
    <div class="appbar-actions">
        <select id="langSelector" onchange="i18n.change(this.value)">
            <option value="es">Español</option>
            <option value="en">English</option>
        </select>
        <button class="win-btn-primary" onclick="dbManager.guardar()" style="background:#28a745">💾 GUARDAR PROYECTO</button>
        <button class="win-btn-ghost" onclick="location.reload()">🔄 Cambiar Buque</button>
        <div id="status-sync" class="win-status"></div>
    </div>
</header>

<main>
    <div id="modalPin" class="overlay"><div class="win-dialog"><h3>🔐 PIN de Acceso</h3><input type="password" id="inputPin" value="1201"><button onclick="authManager.login()">Entrar</button></div></div>
    <div id="modalProyecto" class="overlay" style="display:none;"><div class="win-dialog"><h3>🚢 Proyectos</h3><div id="listaProyectosNube"></div><hr><input type="text" id="p_buque" placeholder="Nombre Buque"><button onclick="proyectManager.crearNuevo()">Crear Nuevo</button></div></div>

    <section id="page-lineas" class="page active">
        <div class="win-card">
            <h4>Registro de Líneas</h4>
            <div class="win-grid-2">
                <input type="text" id="l_numero" placeholder="Nº Línea (ej. L01)">
                <input type="text" id="l_servicio" placeholder="Servicio (ej. Extracción Cocinas)">
            </div>
            <button class="win-btn-primary" onclick="lineManager.nuevaLinea()">+ Registrar Línea</button>
        </div>
        <div id="listaLineas" class="win-list-container"></div>
    </section>

    <section id="page-red" class="page">
        <div class="win-card">
            <h4>🛠 Configuración de Componente</h4>
            
            <div class="win-grid-2">
                <div>
                    <label>Forma del Conducto</label>
                    <select id="compForma" onchange="ui.toggleForma(this.value)">
                        <option value="rectangular">Rectangular</option>
                        <option value="circular">Circular / Spiro</option>
                        <option value="oval">Ovalado</option>
                    </select>
                </div>
                <div>
                    <label>Jerarquía</label>
                    <select id="compJerarquia">
                        <option value="Principal">Principal</option>
                        <option value="Ramal">Ramal</option>
                        <option value="Derivación">Derivación</option>
                    </select>
                </div>
            </div>

            <label>Accesorio (Cátalogo K-Factor)</label>
            <select id="compTipo" style="font-family: monospace;"></select>

            <div id="dims-rectangular" class="win-grid-2">
                <div><label>Ancho W (mm)</label><input type="number" id="compAncho" value="400"></div>
                <div><label>Alto H (mm)</label><input type="number" id="compAlto" value="300"></div>
            </div>
            
            <div id="dims-circular" style="display:none;">
                <label>Diámetro Ø (mm)</label><input type="number" id="compDiametro" value="250">
            </div>

            <div class="win-grid-2">
                <div><label>Longitud L (mm)</label><input type="number" id="compL" value="1000"></div>
                <div><label>Caudal Q (m³/h)</label><input type="number" id="compQ" value="1200"></div>
            </div>

            <label>Dirección Proyectada</label>
            <select id="compDir"></select>

            <button class="win-btn-success" onclick="netManager.addNode()" id="btnAddNode" style="width:100%; margin-top:10px; font-weight:bold;">✅ AÑADIR A LA RED</button>
        </div>
        <div id="treeContainer" class="win-tree"></div>
    </section>

    <section id="page-visor" class="page page-full">
        <div id="container3d"></div>
    </section>
</main>

<nav class="win-taskbar">
    <button onclick="ui.showPage('lineas')">📁 Líneas</button>
    <button onclick="ui.showPage('red')">📐 Diseño</button>
    <button onclick="ui.showPage('visor')">🧊 Visor 3D</button>
</nav>

<script src="app.js" type="module"></script>
</body>
</html>
